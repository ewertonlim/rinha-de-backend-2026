services:
  api1:
    image: ewertonlim/rinha-api:latest
    hostname: api1
    environment:
      - PORT=8080
      - API_SOCKET=/sockets/api1.sock
      - INDEX_PATH=/data/index.bin
      - NORM_PATH=/data/normalization.json
      - MCC_PATH=/data/mcc_risk.json
      - NPROBE=10
    volumes:
      - sockets:/sockets
    deploy:
      resources:
        limits:
          cpus: "0.35"
          memory: "160MB"
    networks:
      - rinha

  api2:
    image: ewertonlim/rinha-api:latest
    hostname: api2
    environment:
      - PORT=8080
      - API_SOCKET=/sockets/api2.sock
      - INDEX_PATH=/data/index.bin
      - NORM_PATH=/data/normalization.json
      - MCC_PATH=/data/mcc_risk.json
      - NPROBE=10
    volumes:
      - sockets:/sockets
    deploy:
      resources:
        limits:
          cpus: "0.35"
          memory: "160MB"
    networks:
      - rinha
  haproxy:
    image: haproxy:alpine
    ports:
      - "9999:9999"
    volumes:
      - ./haproxy/haproxy.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro
      - sockets:/sockets
    depends_on:
      - api1
      - api2
    deploy:
      resources:
        limits:
          cpus: "0.30"
          memory: "30MB"
    networks:
      - rinha

networks:
  rinha:
    driver: bridge

volumes:
  sockets:
    driver: local
    driver_opts:
      type: tmpfs
      device: tmpfs
      o: "size=4m,uid=0,gid=0,mode=0777"
