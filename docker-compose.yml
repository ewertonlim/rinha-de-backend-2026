services:
  haproxy:
    image: haproxy:alpine
    user: "root"
    ports:
      - "9999:9999"
    volumes:
      - ./haproxy/haproxy.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro
      - sockets:/tmp/sockets
    depends_on:
      api1:
        condition: service_healthy
      api2:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "0.30"
          memory: "30MB"
    networks:
      - rinha

  api1:
    image: ewertonlim/rinha-api:latest
    hostname: api1
    environment:
      - PORT=8080
      - API_SOCKET=/tmp/sockets/api1.sock
      - INDEX_PATH=/data/index.bin
      - NORM_PATH=/data/normalization.json
      - MCC_PATH=/data/mcc_risk.json
      - NPROBE=10
    volumes:
      - sockets:/tmp/sockets
    healthcheck:
      test: [ "CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1:8080/ready" ]
      interval: 2s
      timeout: 2s
      retries: 30
      start_period: 5s
    deploy:
      resources:
        limits:
          cpus: "0.35"
          memory: "160MB"
    networks:
      - rinha

  api2:
    image: ewertonlim/rinha-api:latest
    hostname: api2
    environment:
      - PORT=8080
      - API_SOCKET=/tmp/sockets/api2.sock
      - INDEX_PATH=/data/index.bin
      - NORM_PATH=/data/normalization.json
      - MCC_PATH=/data/mcc_risk.json
      - NPROBE=10
    volumes:
      - sockets:/tmp/sockets
    healthcheck:
      test: [ "CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1:8080/ready" ]
      interval: 2s
      timeout: 2s
      retries: 30
      start_period: 5s
    deploy:
      resources:
        limits:
          cpus: "0.35"
          memory: "160MB"
    networks:
      - rinha

networks:
  rinha:
    driver: bridge

volumes:
  sockets:
