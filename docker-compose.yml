services:
  nginx:
    image: nginx:alpine
    ports:
      - "9999:9999"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - sockets:/sockets
    depends_on:
      api1:
        condition: service_healthy
      api2:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "0.05"
          memory: "20MB"
    networks:
      - rinha

  api1:
    image: ewertonlim/rinha-api:latest
    hostname: api1
    network_mode: "none"
    environment:
      - PORT=8080
      - INDEX_PATH=/data/index.bin
      - NORM_PATH=/data/normalization.json
      - MCC_PATH=/data/mcc_risk.json
      - API_SOCKET=/sockets/api1.sock
      - NPROBE=2
    volumes:
      - sockets:/sockets
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1:8080/ready"]
      interval: 2s
      timeout: 2s
      retries: 30
      start_period: 5s
    deploy:
      resources:
        limits:
          cpus: "0.475"
          memory: "165MB"

  api2:
    image: ewertonlim/rinha-api:latest
    hostname: api2
    network_mode: "none"
    environment:
      - PORT=8080
      - INDEX_PATH=/data/index.bin
      - NORM_PATH=/data/normalization.json
      - MCC_PATH=/data/mcc_risk.json
      - API_SOCKET=/sockets/api2.sock
      - NPROBE=2
    volumes:
      - sockets:/sockets
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1:8080/ready"]
      interval: 2s
      timeout: 2s
      retries: 30
      start_period: 5s
    deploy:
      resources:
        limits:
          cpus: "0.475"
          memory: "165MB"

networks:
  rinha:
    driver: bridge

volumes:
  sockets:
