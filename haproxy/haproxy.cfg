global
    # Limita conexões para não estourar a RAM de 30MB e manter baixo uso de buffers
    maxconn 4096
    
    # Com 0.1 de CPU, usar mais de uma thread só gera overhead de lock e troca de contexto
    nbthread 1

defaults
    mode http
    
    # Timeouts curtos para descartar requisições zumbis e liberar recursos rápido
    timeout connect 3s
    timeout client  30s
    timeout server  30s
    timeout http-keep-alive 5s
    
    # Desativa todos os logs - string parsing e I/O de log comem muita CPU
    option dontlognull
    option dontlog-normal

frontend rinha
    bind *:9999
    # Repassa pro backend instantaneamente
    default_backend apis

backend apis
    # roundrobin é o algoritmo de balanceamento mais leve (O(1) na CPU)
    balance roundrobin
    
    # CONFIGURAÇÃO DE OURO: Reaproveita as conexões TCP já abertas com os backends.
    # Isso evita o custo altíssimo de CPU fazendo o 3-way handshake (SYN, SYN-ACK, ACK)
    # para cada requisição repassada.
    http-reuse always
    
    # Não usamos `check` aqui porque o docker-compose já faz o healthcheck inicial.
    # Evita que o HAProxy gaste CPU mandando pings a cada X segundos.
    server api1 api1:8080
    server api2 api2:8080
